<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quantum Terminal</title>
    <link rel="stylesheet" href="styles.css?v=20260324b" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar glass">
        <div class="brand-block">
          <p class="eyebrow">Quantum Terminal</p>
          <h1>Multi-Timeframe Market Surface</h1>
        </div>
        <div class="topbar-meta">
          <div class="meta-pill">
            <span>Symbol</span>
            <strong id="active-symbol-label">XAUUSD</strong>
          </div>
          <div class="meta-pill">
            <span>Status</span>
            <strong id="bridge-status">Connecting</strong>
          </div>
          <div class="meta-pill clock-pill">
            <span>Local Time</span>
            <strong id="clock-label">--:--:--</strong>
          </div>
        </div>
      </header>

      <section class="hero glass hero-controls">
        <div class="hero-actions">
          <label class="symbol-field">
            <span>MT5 Symbol</span>
            <input id="symbol-input" type="text" value="XAUUSD" spellcheck="false" />
          </label>
          <label class="symbol-field narrow">
            <span>Bars</span>
            <input id="limit-input" type="text" value="ALL" spellcheck="false" />
          </label>
          <button id="refresh-board" class="action-button primary" type="button">Refresh Board</button>
          <button id="jump-newest" class="action-button" type="button">Go To Newest</button>
          <button id="toggle-motion" class="action-button" type="button">Pause Live Sync</button>
        </div>
      </section>

      <main id="board" class="board"></main>
    </div>

    <script src="app.js?v=20260324b"></script>
  </body>
</html>
